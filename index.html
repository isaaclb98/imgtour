<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgtour</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --dim: rgba(255,255,255,0.25);
      --glow: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #chrome {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #progress {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--dim);
      cursor: default;
      line-height: 1;
    }

    #undo-btn {
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    #undo-btn:hover { color: rgba(255,255,255,0.9); background: var(--glow); }
    #undo-btn:active { opacity: 0.6; }
    #undo-btn svg { width: 16px; height: 16px; display: block; }

    #match {
      display: flex;
      width: 100vw;
      height: 100vh;
      gap: 0;
    }

    .choice {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      padding: 2%;
    }

    .choice:hover { background: var(--glow); }

    .choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      40% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .choice.pulse { animation: pulse 0.25s ease-out; }

    #results {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 32px;
    }

    #results h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-transform: uppercase;
    }

    #download-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: rgba(255,255,255,0.7);
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }
    #download-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

    #loading {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 200;
    }
    #loading.active { display: flex; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="chrome">
    <span id="progress">Match 1/7</span>
    <button id="undo-btn" title="Undo last pick" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-4.95"></path>
      </svg>
    </button>
  </div>

  <div id="match">
    <div class="choice" id="choice-a">
      <img id="img-a" alt="">
    </div>
    <div class="choice" id="choice-b">
      <img id="img-b" alt="">
    </div>
  </div>

  <div id="results">
    <h1>Tournament complete</h1>
    <button id="download-btn">Download CSV</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
  </div>

  <script>
    const state = {
      uuid: null,
      tournament: null,
      currentMatch: null,
      disabled: false,
    };

    async function api(path, opts) {
      const r = await fetch(path, opts || {});
      if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
      return r.json();
    }

    async function init() {
      document.getElementById('loading').classList.add('active');
      const list = await api('/api/tournament').catch(() => null);
      if (list && list.active_uuid) {
        state.uuid = list.active_uuid;
        state.tournament = await api(`/api/tournament/${state.uuid}`);
        state.currentMatch = state.tournament.currentMatch;
      } else {
        // POST returns full tournament state with uuid + currentMatch — no follow-up GET needed
        const created = await api('/api/tournament', { method: 'POST' });
        state.uuid = created.uuid;
        state.tournament = created;
        state.currentMatch = created.currentMatch;
      }
      updateUI();
      document.getElementById('loading').classList.remove('active');
    }

    function updateUI() {
      const t = state.tournament;
      const m = state.currentMatch;
      if (!t || !m) return;

      document.getElementById('progress').textContent =
        `Match ${t.currentMatchIndex + 1}/${t.totalMatches}`;

      const imgA = document.getElementById('img-a');
      const imgB = document.getElementById('img-b');
      imgA.src = '/api/images/' + m.imageA;
      imgB.src = '/api/images/' + m.imageB;

      document.getElementById('undo-btn').disabled =
        t.status === 'COMPLETE' || !t.lastMatchId;
    }

    async function vote(winnerPath) {
      if (state.disabled || !state.currentMatch) return;
      state.disabled = true;

      const el = winnerPath === state.currentMatch.imageA
        ? document.getElementById('choice-a')
        : document.getElementById('choice-b');
      el.classList.add('pulse');

      try {
        const result = await api(`/api/match/${state.currentMatch.id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ winner: winnerPath }),
        });
        if (result.tournament && result.tournament.status === 'COMPLETE') {
          document.getElementById('match').style.display = 'none';
          document.getElementById('chrome').style.display = 'none';
          document.getElementById('results').style.display = 'flex';
        } else {
          // Prefetch next match images immediately after vote response
          // so they're in browser HTTP cache by the time user clicks again
          const nextMatch = result.tournament && result.tournament.currentMatch;
          if (nextMatch) {
            const preloadA = new Image();
            const preloadB = new Image();
            preloadA.src = '/api/images/' + nextMatch.imageA;
            preloadB.src = '/api/images/' + nextMatch.imageB;
          }
          state.tournament = result.tournament;
          state.currentMatch = nextMatch;
          updateUI();
        }
      } catch (e) {
        console.error(e);
      } finally {
        state.disabled = false;
        el.classList.remove('pulse');
      }
    }

    async function undo() {
      if (!state.uuid) return;
      try {
        const result = await api(`/api/tournament/${state.uuid}/undo`, { method: 'POST' });
        state.tournament = result;
        state.currentMatch = result.currentMatch;
        updateUI();
      } catch (e) {
        console.error(e);
      }
    }

    document.getElementById('choice-a').addEventListener('click', () => {
      if (!state.currentMatch || state.disabled) return;
      vote(state.currentMatch.imageA);
    });
    document.getElementById('choice-b').addEventListener('click', () => {
      if (!state.currentMatch || state.disabled) return;
      vote(state.currentMatch.imageB);
    });
    document.getElementById('undo-btn').addEventListener('click', undo);
    document.getElementById('download-btn').addEventListener('click', () => {
      window.location.href = `/api/tournament/${state.uuid}/export`;
    });

    document.getElementById('loading').classList.add('active');
    init().catch(e => console.error(e));
  </script>
</body>
</html>
