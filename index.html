<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imgtour</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --dim: rgba(255,255,255,0.25);
      --glow: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #chrome {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #progress {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--dim);
      cursor: default;
      line-height: 1;
    }

    #undo-btn {
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: rgba(255,255,255,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      line-height: 1;
    }
    #undo-btn:hover { color: rgba(255,255,255,0.9); background: var(--glow); }
    #undo-btn svg { width: 16px; height: 16px; display: block; }

    #match {
      display: flex;
      width: 100vw;
      height: 100vh;
      gap: 0;
    }

    .choice {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      padding: 2%;
    }

    .choice:hover { background: var(--glow); }

    .choice img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #results {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 32px;
    }

    #results h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-transform: uppercase;
    }

    #download-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: rgba(255,255,255,0.7);
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.04em;
    }
    #download-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

    #loading {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 200;
    }
    #loading.active { display: flex; }
  </style>
</head>
<body>

  <div id="chrome">
    <span id="progress">Match 1/7</span>
    <button id="undo-btn" title="Undo last pick" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-4.95"></path>
      </svg>
    </button>
  </div>

  <div id="match">
    <div class="choice" id="choice-a">
      <img id="img-a" alt="">
    </div>
    <div class="choice" id="choice-b">
      <img id="img-b" alt="">
    </div>
  </div>

  <div id="results">
    <h1>Tournament complete</h1>
    <button id="download-btn">Download CSV</button>
  </div>

  <div id="loading">
  </div>

  <script>
    const state = {
      uuid: null,
      matches: [],
      images: [],
      currentMatchIndex: 0,
      totalMatches: 0,
      disabled: false,
      pendingVote: false,
      totalRounds: 0,
    };

    async function api(path, opts) {
      const r = await fetch(path, opts || {});
      if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
      return r.json();
    }

    async function init() {
      document.getElementById('loading').classList.add('active');
      const list = await api('/api/tournament').catch(() => null);
      if (list && list.active_uuid) {
        state.uuid = list.active_uuid;
        const t = await api(`/api/tournament/${state.uuid}`);
        state.matches = t.matches || [];
        state.images = t.images || [];
        state.totalRounds = t.totalRounds || 1;
        state.totalMatches = t.totalMatches || state.matches.length;
        state.currentMatchIndex = findCurrentMatchIndex();
      } else {
        const created = await api('/api/tournament', { method: 'POST' });
        state.uuid = created.uuid;
        state.matches = created.matches || [];
        state.images = created.images || [];
        state.totalRounds = created.totalRounds || 1;
        state.totalMatches = created.totalMatches || state.matches.length;
        state.currentMatchIndex = findCurrentMatchIndex();
      }
      updateUI();
      document.getElementById('loading').classList.remove('active');
    }

    function findCurrentMatchIndex() {
      for (let i = 0; i < state.matches.length; i++) {
        if (!state.matches[i].winner) return i;
      }
      return state.matches.length - 1;
    }

    function updateUI() {
      const match = state.matches[state.currentMatchIndex];
      if (!match) return;

      const completedCount = state.matches.filter(m => m.winner).length;
      document.getElementById('progress').textContent =
        `Match ${completedCount + 1}/${state.totalMatches}`;

      const imgA = document.getElementById('img-a');
      const imgB = document.getElementById('img-b');
      imgA.src = '/api/images/' + encodeURIComponent(match.imageA);
      imgB.src = '/api/images/' + encodeURIComponent(match.imageB);

      const canUndo = completedCount > 0;
      document.getElementById('undo-btn').disabled = !canUndo;

      const complete = !state.pendingVote && state.matches.every(m => m.winner);
      if (complete) {
        document.getElementById('match').style.display = 'none';
        document.getElementById('chrome').style.display = 'none';
        document.getElementById('results').style.display = 'flex';
      }
    }

    function vote(winnerPath) {
      if (state.disabled) return;
      state.disabled = true;
      state.pendingVote = true;

      // Optimistic local update — instant, no waiting
      state.matches[state.currentMatchIndex].winner = winnerPath;
      const prevIndex = state.currentMatchIndex;
      state.currentMatchIndex = findCurrentMatchIndex();
      updateUI();
      prefetchNextMatch();

      // Fire-and-forget persistence — merge returned matches to stay in sync
      const matchId = state.matches[prevIndex].id;
      fetch('/api/match/' + matchId + '/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ winner: winnerPath }),
      }).then(res => res.json()).then(data => {
        if (data.tournament && data.tournament.matches) {
          // Merge new matches from server (round N+1 created when round N completed)
          const existingIds = new Set(state.matches.map(m => m.id));
          for (const m of data.tournament.matches) {
            if (!existingIds.has(m.id)) {
              state.matches.push(m);
            }
          }
          // Re-evaluate current match index now that new round matches may exist
          state.currentMatchIndex = findCurrentMatchIndex();
        }
        state.pendingVote = false;
        state.disabled = false;
        updateUI();
      }).catch(e => {
        console.error(e);
        state.pendingVote = false;
        state.disabled = false;
      });
    }

    function prefetchNextMatch() {
      const nextIndex = findCurrentMatchIndex();
      if (nextIndex < state.matches.length) {
        const next = state.matches[nextIndex];
        const preloadA = new Image();
        const preloadB = new Image();
        preloadA.src = '/api/images/' + encodeURIComponent(next.imageA);
        preloadB.src = '/api/images/' + encodeURIComponent(next.imageB);
      }
    }

    async function undo() {
      if (!state.uuid) return;
      const lastCompleted = state.matches.filter(m => m.winner).pop();
      if (!lastCompleted) return;

      state.disabled = true;
      try {
        const result = await api(`/api/tournament/${state.uuid}/undo`, { method: 'POST' });
        state.matches = result.matches || [];
        state.currentMatchIndex = findCurrentMatchIndex();
        updateUI();
      } catch (e) {
        console.error(e);
      } finally {
        state.disabled = false;
      }
    }

    document.getElementById('choice-a').addEventListener('click', () => {
      const match = state.matches[state.currentMatchIndex];
      if (!match || state.disabled) return;
      vote(match.imageA);
    });
    document.getElementById('choice-b').addEventListener('click', () => {
      const match = state.matches[state.currentMatchIndex];
      if (!match || state.disabled) return;
      vote(match.imageB);
    });
    document.getElementById('undo-btn').addEventListener('click', undo);
    document.getElementById('download-btn').addEventListener('click', () => {
      window.location.href = `/api/tournament/${state.uuid}/export`;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        const match = state.matches[state.currentMatchIndex];
        if (match && !state.disabled) vote(match.imageA);
      } else if (e.key === 'ArrowRight') {
        const match = state.matches[state.currentMatchIndex];
        if (match && !state.disabled) vote(match.imageB);
      } else if (e.key === 'ArrowDown') {
        undo();
      }
    });

    document.getElementById('loading').classList.add('active');
    init().catch(e => console.error(e));
  </script>
</body>
</html>
